<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swedish Football — Global Footprint</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --yellow:#FFCD00;--blue:#006AA7;
  --bg:#07101a;--panel:#060d18;
  --text:#d8d2c8;--muted:#43596e;--border:rgba(255,205,0,.09)
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Space Mono',monospace;color:var(--text)}
#map{position:fixed;inset:0}

#boot{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .7s}
#boot.gone{opacity:0;pointer-events:none}
#boot-logo{font-family:'Bebas Neue',sans-serif;font-size:54px;letter-spacing:.1em;color:var(--yellow);line-height:1}
#boot-sub{font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted)}
#boot-msg{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);min-height:14px}
#boot-bar{width:220px;height:1px;background:rgba(255,255,255,.06)}
#boot-prog{height:100%;width:0;background:var(--yellow);transition:width .3s ease}
#boot-err{font-size:10px;color:#c04a4a;text-align:center;max-width:360px;line-height:1.8;display:none;padding:0 20px;white-space:pre-line;margin-top:8px}

#hd{position:fixed;top:22px;left:26px;z-index:90;pointer-events:none;user-select:none}
#hd h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,3.2vw,40px);line-height:.86;letter-spacing:.07em;color:var(--text)}
#hd h1 em{color:var(--yellow);font-style:normal;display:block}
#hd p{margin-top:7px;font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted)}
#zlbl{position:fixed;top:22px;right:24px;z-index:90;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}

#stats{position:fixed;bottom:22px;left:26px;z-index:90;display:flex;gap:20px;pointer-events:none}
.st{font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
.st strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:23px;letter-spacing:.04em;color:var(--yellow);line-height:1}

#hint{position:fixed;bottom:22px;right:24px;z-index:90;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);opacity:0;animation:fh 8s ease 3.5s forwards}
@keyframes fh{0%{opacity:0}15%{opacity:.6}75%{opacity:.6}100%{opacity:.12}}

#live{position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:90;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);opacity:0;transition:opacity .4s;white-space:nowrap}
#live.on{opacity:1}
#live.ok{color:#3aaa66}

#tiers{position:fixed;top:50%;right:24px;transform:translateY(-50%);z-index:90;display:flex;flex-direction:column;gap:9px;pointer-events:none}
.tk{display:flex;align-items:center;gap:7px;font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
.tk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Panel */
#panel{position:fixed;top:0;right:0;width:min(380px,100vw);height:100%;background:var(--panel);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-left:1px solid var(--border);z-index:200;transform:translateX(102%);transition:transform .4s cubic-bezier(.22,1,.36,1);overflow-y:auto;overflow-x:hidden}
#panel.open{transform:translateX(0)}
#pcls{position:sticky;top:0;float:right;margin:14px 14px 0 0;width:26px;height:26px;background:none;border:1px solid rgba(255,255,255,.07);color:var(--text);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s;font-family:'Space Mono',monospace;z-index:201}
#pcls:hover{border-color:var(--yellow);color:var(--yellow)}
#pbody{padding:46px 22px 54px;clear:both}

/* Panel – club mode */
.pc-tag{font-size:8px;letter-spacing:.26em;text-transform:uppercase;color:var(--yellow);margin-bottom:3px}
.pc-name{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:.9;letter-spacing:.05em;margin-bottom:2px}
.pc-sub{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.divider{width:26px;height:1px;background:var(--yellow);margin-bottom:14px;opacity:.7}
.ply{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:padding-left .15s}
.ply:hover{padding-left:4px}
.ply-rank{font-size:8px;color:var(--muted);letter-spacing:.07em;margin-bottom:1px}
.ply-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.05em;line-height:1}
.ply-name.legend{color:var(--yellow)}
.ply-name.star{color:#80b4cc}
.ply-meta{font-size:8px;color:var(--muted);margin-top:2px;letter-spacing:.05em}
.ply-bio{display:none;margin-top:7px;padding:8px 10px;background:rgba(255,205,0,.025);border-left:2px solid rgba(255,205,0,.3);font-size:9px;line-height:1.8;color:#627a8a}
.ply-bio.open{display:block}
.bio-row{display:flex;gap:12px;margin-top:7px;flex-wrap:wrap}
.bs{font-size:8px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.bs strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--text);line-height:1.1}

/* Panel – player mode (clicked individual dot) */
.pv-back{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);cursor:pointer;margin-bottom:12px;display:inline-block}
.pv-back:hover{color:var(--yellow)}
.pv-pos{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--yellow);margin-bottom:3px}
.pv-name{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:.88;letter-spacing:.06em;margin-bottom:2px}
.pv-meta{font-size:8px;color:var(--muted);letter-spacing:.1em;margin-bottom:14px}
.pv-club-head{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.06em;color:var(--yellow);margin:14px 0 4px}
.pv-club-bio{font-size:9px;line-height:1.8;color:#627a8a;margin-bottom:6px}
.pv-stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;padding:8px 10px;background:rgba(255,205,0,.025);border-left:2px solid rgba(255,205,0,.3)}
.pv-stat{font-size:8px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.pv-stat strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text);line-height:1.1}
.pv-other{font-size:8px;color:var(--muted);letter-spacing:.1em;margin-top:12px;text-transform:uppercase}
.pv-other-list{margin-top:5px}
.pv-other-item{font-size:9px;color:#3d5a6e;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer}
.pv-other-item:hover{color:#80b4cc}

/* MapLibre overrides */
.maplibregl-ctrl-bottom-right,.maplibregl-ctrl-bottom-left,
.maplibregl-ctrl-top-right,.maplibregl-ctrl-top-left{display:none}
.maplibregl-popup{max-width:260px!important}
.maplibregl-popup-content{background:rgba(5,10,20,.97);border:1px solid rgba(255,205,0,.18);border-radius:2px;padding:9px 12px;font-family:'Space Mono',monospace;box-shadow:0 8px 32px rgba(0,0,0,.7)}
.maplibregl-popup-tip{border-top-color:transparent!important;border-bottom-color:rgba(5,10,20,.97)!important}
.maplibregl-popup-close-button{color:var(--muted);font-size:14px;right:6px;top:4px;background:none}
.maplibregl-popup-close-button:hover{color:var(--yellow);background:none}
.pop-tag{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--yellow);margin-bottom:2px}
.pop-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;line-height:1;color:var(--text);margin-bottom:1px}
.pop-meta{font-size:8px;color:var(--muted)}
.pop-cta{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--yellow);cursor:pointer;margin-top:6px;opacity:.8;display:block}
.pop-cta:hover{opacity:1}

@media(max-width:520px){
  #hd{top:12px;left:12px}
  #stats{bottom:12px;left:12px;gap:12px}
  #hint,#tiers{display:none}
  #zlbl{top:12px;right:12px}
}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">SWEDISH<br>FOOTBALL</div>
  <div id="boot-sub">Global Footprint · All Time</div>
  <div id="boot-msg">Loading…</div>

  <div id="boot-err"></div>
</div>

<div id="map"></div>

<div id="hd">

</div>
<div id="zlbl">World View</div>
<div id="live">⟳ Fetching live data…</div>

<div id="stats">

  <div class="st"><strong id="s-clubs">—</strong>Clubs</div>
  <div class="st"><strong id="s-cnt">—</strong>Nations</div>
</div>
<div id="hint">Zoom in to see individual players around each stadium</div>

<div id="tiers">
  <div class="tk"><div class="tk-dot" style="background:#FFCD00"></div>Legend</div>
  <div class="tk"><div class="tk-dot" style="background:#7ab6d0"></div>Star</div>
  <div class="tk"><div class="tk-dot" style="background:#3d7a99"></div>International</div>
  <div class="tk"><div class="tk-dot" style="background:#1e3d50"></div>Regular</div>
</div>

<div id="panel">
  <button id="pcls" onclick="closePanel()">✕</button>
  <div id="pbody"></div>
</div>

<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>

const $msg  = document.getElementById('boot-msg');
function setP(pct, msg) { $prog.style.width = pct + '%'; if (msg) $msg.textContent = msg; }
function bootErr(msg) {
  document.getElementById('boot-err').style.display = 'block';
  document.getElementById('boot-err').textContent = msg;
  $msg.textContent = 'Failed to load';
  $prog.style.background = '#c04a4a';
}

// Build clubMap: one entry per CLUBS key, with player list
const clubMap = {};    // clubName → { ...CLUBS[c], clubName, players:[{player, clubEntry}] }
const seenNames = new Set();

PLAYERS.forEach(p => {
  if (seenNames.has(p.name)) return;
  seenNames.add(p.name);
  p.clubs.forEach(ce => {
    if (!CLUBS[ce.name]) return;
    if (!clubMap[ce.name]) clubMap[ce.name] = { ...CLUBS[ce.name], clubName: ce.name, players: [] };
    clubMap[ce.name].players.push({ player: p, entry: ce });
  });
});

// Sort by influence descending within each club
Object.values(clubMap).forEach(cm =>
  cm.players.sort((a, b) => b.player.influence - a.player.influence)
);

function tierColor(inf) {
  if (inf >= 85) return '#FFCD00';
  if (inf >= 65) return '#7ab6d0';
  if (inf >= 40) return '#3d7a99';
  return '#1e3d50';
}

// ── Club-level GeoJSON (one dot per club, top player) ────────────
function buildClubGeoJSON() {
  return {
    type: 'FeatureCollection',
    features: Object.values(clubMap).map(cm => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [cm.lng, cm.lat] },
      properties: {
        id: cm.clubName,
        stadium: cm.stadium,
        city: cm.city,
        country: cm.country,
        influence: cm.players[0].player.influence,
        color: tierColor(cm.players[0].player.influence),
        topName: cm.players[0].player.name,
        count: cm.players.length,
      }
    }))
  };
}

// ── Player-level GeoJSON (spread around stadium at close zoom) ───
// Players are arranged in a small circle around the stadium centre.
// Radius: ~120m in lat/lng degrees. Single players sit on the spot.
const SPREAD_R = 0.0014; // ~120–150m

function spreadCoord(index, total, baseLat, baseLng) {
  if (total === 1) return [baseLng, baseLat];
  const angle = (index / total) * 2 * Math.PI - Math.PI / 2;
  return [
    baseLng + SPREAD_R * Math.cos(angle),
    baseLat + SPREAD_R * Math.sin(angle) * 0.7, // compress latitude slightly
  ];
}

function buildPlayerGeoJSON() {
  const features = [];
  Object.values(clubMap).forEach(cm => {
    const total = cm.players.length;
    cm.players.forEach(({ player: p, entry: ce }, i) => {
      const [lng, lat] = spreadCoord(i, total, cm.lat, cm.lng);
      features.push({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [lng, lat] },
        properties: {
          playerName: p.name,
          clubName: cm.clubName,
          pos: p.pos,
          born: p.born,
          caps: p.caps,
          goals: p.goals,
          influence: p.influence,
          color: tierColor(p.influence),
          active: p.active ? 1 : 0,
          years: ce.years,
          apps: ce.apps,
          ceGoals: ce.goals,
          trophies: ce.trophies,
          stadium: cm.stadium,
          country: cm.country,
        }
      });
    });
  });
  return { type: 'FeatureCollection', features };
}

// ── Arcs (Stockholm → legends) ───────────────────────────────────
function buildArcs() {
  return {
    type: 'FeatureCollection',
    features: Object.values(clubMap)
      .filter(cm => cm.players[0].player.influence >= 85)
      .map(cm => ({
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: [[18.07, 59.33], [cm.lng, cm.lat]] },
        properties: {}
      }))
  };
}

function updateStats() {
  document.getElementById('s-ply').textContent = seenNames.size;
  document.getElementById('s-clubs').textContent = Object.keys(clubMap).length;
  document.getElementById('s-cnt').textContent = new Set(Object.values(CLUBS).map(c => c.country)).size;
}
updateStats();

setP(30, 'Starting map engine…');
let map, rotating = true;

function zoomLabel(z) {
  if (z < 4)  return 'World View';
  if (z < 6)  return 'Continental';
  if (z < 9)  return 'Regional';
  if (z < 12) return 'City View';
  return 'Stadium View';
}

const ZOOM_CLUB_FADE_START  = 10;
const ZOOM_CLUB_FADE_END    = 11.5;
const ZOOM_PLAYER_FADE_START = 10.5;
const ZOOM_PLAYER_FADE_END  = 12;

function initMap() {
  try {
    map = new maplibregl.Map({
      container: 'map',
      style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
      center: [14, 50],
      zoom: 3,
      projection: 'globe',
      attributionControl: false,
    });

    const loadTimeout = setTimeout(() =>
      bootErr('Map style timed out — try refreshing or disable ad blocker.'), 14000);

    map.on('load', () => { clearTimeout(loadTimeout); onMapLoad(); });
    map.on('error', e => {
      clearTimeout(loadTimeout);
      console.error('Map error', e);
    });
  } catch(err) { bootErr('Map init failed: ' + err.message); }
}

function onMapLoad() {
  setP(80, 'Adding layers…');
  try {

    // Atmosphere
    try {
      map.setFog({
        color: 'rgba(200,218,240,0.5)',
        'high-color': 'rgba(140,180,220,0.9)',
        'space-color': '#07101a',
        'star-intensity': 0.5,
        'horizon-blend': 0.04,
      });
    } catch(e) { console.warn('Fog unsupported'); }

    // Sources
    map.addSource('clubs',   { type: 'geojson', data: buildClubGeoJSON()  });
    map.addSource('players', { type: 'geojson', data: buildPlayerGeoJSON() });
    map.addSource('arcs',    { type: 'geojson', data: buildArcs()          });

    // ── Arcs ─────────────────────────────────────────────────────
    map.addLayer({ id:'arcs', type:'line', source:'arcs',
      paint:{
        'line-color':'#FFCD00','line-width':0.7,
        'line-opacity':['interpolate',['linear'],['zoom'], 2,0.22, 6,0]
      }, layout:{'line-cap':'round'}
    });

    // ── Club halos ────────────────────────────────────────────────
    map.addLayer({ id:'clubs-halo', type:'circle', source:'clubs',
      paint:{
        'circle-radius':['interpolate',['linear'],['zoom'], 2,['*',['get','influence'],0.06], 6,['*',['get','influence'],0.13], 10,['*',['get','influence'],0.24]],
        'circle-color':['get','color'],
        'circle-opacity':['interpolate',['linear'],['zoom'], ZOOM_CLUB_FADE_START,0.14, ZOOM_CLUB_FADE_END,0],
        'circle-blur':1.2,
      }
    });

    // ── Club dots ─────────────────────────────────────────────────
    map.addLayer({ id:'clubs-dot', type:'circle', source:'clubs',
      paint:{
        'circle-radius':['interpolate',['linear'],['zoom'], 2,['*',['get','influence'],0.030], 5,['*',['get','influence'],0.065], 10,['*',['get','influence'],0.12]],
        'circle-color':['get','color'],
        'circle-stroke-color':'rgba(255,255,255,0.45)',
        'circle-stroke-width':['interpolate',['linear'],['zoom'], 2,0.5, 10,1.5],
        'circle-opacity':['interpolate',['linear'],['zoom'],
          2, ['case',['>=',['get','influence'],85],0.92,0],
          4, ['case',['>=',['get','influence'],85],0.92,['case',['>=',['get','influence'],65],0.88,0]],
          6, ['case',['>=',['get','influence'],65],0.88,['case',['>=',['get','influence'],40],0.84,0]],
          9, 0.84,
          ZOOM_CLUB_FADE_START, 0.84,
          ZOOM_CLUB_FADE_END, 0
        ],
      }
    });

    // ── Club labels ───────────────────────────────────────────────
    try {
      map.addLayer({ id:'clubs-label', type:'symbol', source:'clubs',
        filter:['>=',['get','influence'],85],
        layout:{
          'text-field':['get','topName'],
          'text-font':['Open Sans Regular','Arial Unicode MS Regular'],
          'text-size':['interpolate',['linear'],['zoom'], 3,9, 8,12],
          'text-offset':[0,1.3],'text-anchor':'top','text-allow-overlap':false
        },
        paint:{
          'text-color':'#1a2a38','text-halo-color':'rgba(255,255,255,0.9)','text-halo-width':1.5,
          'text-opacity':['interpolate',['linear'],['zoom'], ZOOM_CLUB_FADE_START,1, ZOOM_CLUB_FADE_END,0],
        }
      });
    } catch(e) { console.warn('Label layer failed:', e); }

    // ── Individual player halos ───────────────────────────────────
    map.addLayer({ id:'players-halo', type:'circle', source:'players',
      paint:{
        'circle-radius':['interpolate',['linear'],['zoom'], 11,6, 14,14, 17,22],
        'circle-color':['get','color'],
        'circle-opacity':['interpolate',['linear'],['zoom'], ZOOM_PLAYER_FADE_START,0, ZOOM_PLAYER_FADE_END,0.15],
        'circle-blur':1.0,
      }
    });

    // ── Individual player dots ────────────────────────────────────
    map.addLayer({ id:'players-dot', type:'circle', source:'players',
      paint:{
        'circle-radius':['interpolate',['linear'],['zoom'], 11,3, 13,5, 15,8, 17,11],
        'circle-color':['get','color'],
        'circle-stroke-color':'rgba(255,255,255,0.55)',
        'circle-stroke-width':1.2,
        'circle-opacity':['interpolate',['linear'],['zoom'], ZOOM_PLAYER_FADE_START,0, ZOOM_PLAYER_FADE_END,0.92],
      }
    });

    // ── Individual player labels ──────────────────────────────────
    try {
      map.addLayer({ id:'players-label', type:'symbol', source:'players',
        layout:{
          'text-field':['get','playerName'],
          'text-font':['Open Sans Regular','Arial Unicode MS Regular'],
          'text-size':['interpolate',['linear'],['zoom'], 12,9, 15,12],
          'text-offset':[0,1.1],'text-anchor':'top','text-allow-overlap':false,
        },
        paint:{
          'text-color':'#1a2a38','text-halo-color':'rgba(255,255,255,0.9)','text-halo-width':1.5,
          'text-opacity':['interpolate',['linear'],['zoom'], 12,0, 13.5,1],
        }
      });
    } catch(e) { console.warn('Player label layer failed:', e); }

    // ── Cursor + Interaction ──────────────────────────────────────
    ['clubs-dot','players-dot'].forEach(layer => {
      map.on('mouseenter', layer, () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', layer, () => { map.getCanvas().style.cursor = ''; });
    });

    let activePopup = null;

    map.on('click', 'clubs-dot', e => {
      rotating = false;
      if (activePopup) { activePopup.remove(); activePopup = null; }
      const p = e.features[0].properties;
      const cm = clubMap[p.id];
      if (!cm) return;
      const top = cm.players[0];
      const more = cm.players.length > 1
        ? `<div class="pop-meta" style="margin-top:3px;font-style:italic">+${cm.players.length - 1} more Swedish players</div>` : '';
      const html = `
        <div class="pop-tag">${p.country} · ${p.stadium}</div>
        <div class="pop-name">${p.id}</div>
        <div class="pop-meta">${top.player.name} · ${top.player.pos}</div>
        ${more}
        <span class="pop-cta" onclick="openClubPanel('${p.id.replace(/'/g,"\\'")}')">View all players →</span>`;
      activePopup = new maplibregl.Popup({ closeButton:true, offset:12 })
        .setLngLat(e.lngLat).setHTML(html).addTo(map);
    });

    map.on('click', 'players-dot', e => {
      rotating = false;
      if (activePopup) { activePopup.remove(); activePopup = null; }
      const pr = e.features[0].properties;
      const html = `
        <div class="pop-tag">${pr.country} · ${pr.stadium}</div>
        <div class="pop-name">${pr.playerName}</div>
        <div class="pop-meta">${pr.pos} · Born ${pr.born} · ${pr.years}</div>
        <div class="pop-meta">${pr.apps} apps · ${pr.ceGoals} goals · ${pr.trophies}</div>
        <span class="pop-cta" onclick="openPlayerPanel('${pr.playerName.replace(/'/g,"\\'")}','${pr.clubName.replace(/'/g,"\\'")}')">Full profile →</span>`;
      activePopup = new maplibregl.Popup({ closeButton:true, offset:12 })
        .setLngLat(e.lngLat).setHTML(html).addTo(map);
    });

    map.on('click', e => {
      const hits = map.queryRenderedFeatures(e.point, { layers:['clubs-dot','players-dot'] });
      if (!hits.length && activePopup) { activePopup.remove(); activePopup = null; }
    });

    map.on('zoom', () => {
      document.getElementById('zlbl').textContent = zoomLabel(map.getZoom());
    });

    // Auto-rotate
    map.on('mousedown', () => { rotating = false; });
    map.on('touchstart', () => { rotating = false; });
    (function spin() {
      if (rotating && map.getZoom() < 4) {
        const c = map.getCenter();
        map.setCenter([c.lng + 0.04, c.lat]);
      }
      requestAnimationFrame(spin);
    })();

    setP(100, '');
    setTimeout(() => document.getElementById('boot').classList.add('gone'), 400);
    fetchWikidata();

  } catch(err) {
    console.error('onMapLoad error:', err);
    bootErr('Map layers failed: ' + err.message);
  }
}

window.openClubPanel = function(clubId) {
  const cm = clubMap[clubId];
  if (!cm) return;
  document.getElementById('pbody').innerHTML = `
    <div class="pc-tag">${cm.country}</div>
    <div class="pc-name">${clubId}</div>
    <div class="pc-sub">${cm.stadium} · ${cm.players.length} Swedish ${cm.players.length === 1 ? 'player' : 'players'}</div>
    <div class="divider"></div>
    ${cm.players.map(({ player: p, entry: ce }, i) => clubPlayerRow(p, ce, i, clubId)).join('')}
    <div style="margin-top:18px;font-size:7px;color:#111e2a;letter-spacing:.12em;text-transform:uppercase">Curated + Wikidata</div>`;
  document.getElementById('panel').classList.add('open');
};

function clubPlayerRow(p, ce, i, cid) {
  const cls = p.influence >= 85 ? 'legend' : p.influence >= 65 ? 'star' : '';
  const id = `bio_${cid.replace(/\W/g,'_')}_${i}`;
  return `<div class="ply" onclick="toggleBio('${id}')">
    <div class="ply-rank">${String(i+1).padStart(2,'0')} · ${p.pos}${p.active ? ' · <span style="color:#3aaa66">Active</span>' : ''}</div>
    <div class="ply-name ${cls}">${p.name}</div>
    <div class="ply-meta">${ce.years} · ${ce.apps} apps · ${ce.goals} goals</div>
    <div class="ply-bio" id="${id}">${ce.bio}
      <div class="bio-row">
        <div class="bs"><strong>${ce.apps}</strong>Apps</div>
        <div class="bs"><strong>${ce.goals}</strong>Goals</div>
        <div class="bs"><strong>${ce.years}</strong>Years</div>
        <div class="bs"><strong style="font-size:10px">${ce.trophies || '—'}</strong>Trophies</div>
      </div>
      <div style="margin-top:8px">
        <span class="pop-cta" onclick="event.stopPropagation();openPlayerPanel('${p.name.replace(/'/g,"\\'")}','${cid.replace(/'/g,"\\'")}')">Full career →</span>
      </div>
    </div>
  </div>`;
}

// ================================================================
//  PANEL  – individual player view (all clubs)
// ================================================================
window.openPlayerPanel = function(playerName, fromClub) {
  const p = PLAYERS.find(x => x.name === playerName);
  if (!p) return;

  const otherClubs = p.clubs
    .filter(ce => ce.name !== fromClub && clubMap[ce.name])
    .map(ce => `<div class="pv-other-item" onclick="openClubPanel('${ce.name.replace(/'/g,"\\'")}')">
      ${ce.name} · ${ce.years} · ${ce.apps} apps · ${ce.goals} goals
    </div>`).join('');

  const thisEntry = p.clubs.find(ce => ce.name === fromClub) || p.clubs[0];

  document.getElementById('pbody').innerHTML = `
    <span class="pv-back" onclick="openClubPanel('${fromClub.replace(/'/g,"\\'")}')">← Back to ${fromClub}</span>
    <div class="pv-pos">${p.pos}${p.active ? ' · <span style="color:#3aaa66">Active</span>' : ''}</div>
    <div class="pv-name">${p.name}</div>
    <div class="pv-meta">Born ${p.born} · ${p.caps} international caps · ${p.goals} international goals</div>
    <p style="font-size:9px;line-height:1.8;color:#627a8a;margin-bottom:8px">${p.bio}</p>
    <div class="pv-club-head">AT ${fromClub.toUpperCase()}</div>
    <div class="pv-stats">
      <div class="pv-stat"><strong>${thisEntry.apps}</strong>Apps</div>
      <div class="pv-stat"><strong>${thisEntry.goals}</strong>Goals</div>
      <div class="pv-stat"><strong>${thisEntry.years}</strong>Period</div>
      <div class="pv-stat"><strong style="font-size:10px">${thisEntry.trophies || '—'}</strong>Trophies</div>
    </div>
    <div class="pv-club-bio">${thisEntry.bio}</div>
    ${otherClubs ? `<div class="pv-other">Also played at</div><div class="pv-other-list">${otherClubs}</div>` : ''}
    <div style="margin-top:18px;font-size:7px;color:#111e2a;letter-spacing:.12em;text-transform:uppercase">Curated + Wikidata</div>`;

  document.getElementById('panel').classList.add('open');
};

window.toggleBio = id => document.getElementById(id)?.classList.toggle('open');
window.closePanel = () => document.getElementById('panel').classList.remove('open');

// ================================================================
//  WIKIDATA LIVE FETCH
// ================================================================
async function fetchWikidata() {
  const lt = document.getElementById('live');
  lt.classList.add('on');
  const q = `SELECT DISTINCT ?player ?playerLabel ?club ?clubLabel ?countryLabel ?lat ?lon ?caps WHERE {
  ?player wdt:P27 wd:Q34;wdt:P106 wd:Q937857;wdt:P54 ?club.
  ?club wdt:P625 ?coord;wdt:P17 ?country.
  FILTER(?country NOT IN (wd:Q34,wd:Q33,wd:Q35,wd:Q20,wd:Q189))
  BIND(geof:latitude(?coord) AS ?lat) BIND(geof:longitude(?coord) AS ?lon)
  OPTIONAL{?player wdt:P1350 ?caps}
  SERVICE wikibase:label{bd:serviceParam wikibase:language "en"}
} LIMIT 1500`;
  try {
    const r = await fetch(
      `https://query.wikidata.org/sparql?query=${encodeURIComponent(q)}&format=json`,
      { headers: { 'Accept': 'application/sparql-results+json' } });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    mergeWikidata(j.results.bindings);
    lt.textContent = '✓ Live data loaded';
    lt.classList.add('ok');
    setTimeout(() => lt.classList.remove('on'), 3500);
  } catch(e) {
    console.warn('Wikidata:', e);
    lt.textContent = 'Using curated data';
    setTimeout(() => lt.classList.remove('on'), 3000);
  }
}

function mergeWikidata(bindings) {
  const known = new Set([...seenNames].map(n => n.toLowerCase()));
  let added = 0;
  bindings.forEach(b => {
    const pName = b.playerLabel?.value, cName = b.clubLabel?.value;
    const lat = parseFloat(b.lat?.value), lon = parseFloat(b.lon?.value);
    const caps = parseInt(b.caps?.value) || 0;
    if (!pName || !cName || isNaN(lat) || isNaN(lon)) return;
    if (known.has(pName.toLowerCase())) return;
    const inf = Math.min(55, Math.max(12, Math.round(caps * 0.6)));
    let ck = Object.keys(CLUBS).find(k => k.toLowerCase() === cName.toLowerCase());
    if (!ck) {
      ck = cName;
      CLUBS[ck] = { lat, lng: lon, city: cName, country: b.countryLabel?.value || '?', stadium: cName };
    }
    const ce = { name: ck, years: '?', apps: caps, goals: 0, trophies: '—', bio: `Swedish international · ${caps} caps · Source: Wikidata.` };
    const np = { name: pName, influence: inf, caps, goals: 0, born: '?', pos: 'Player',
      active: false, bio: `Swedish international. ${caps} caps.`, clubs: [ce] };
    PLAYERS.push(np); seenNames.add(pName); known.add(pName.toLowerCase());
    if (!clubMap[ck]) clubMap[ck] = { ...CLUBS[ck], clubName: ck, players: [] };
    clubMap[ck].players.push({ player: np, entry: ce });
    clubMap[ck].players.sort((a, b) => b.player.influence - a.player.influence);
    added++;
  });
  if (added > 0 && map) {
    updateStats();
    map.getSource('clubs')?.setData(buildClubGeoJSON());
    map.getSource('players')?.setData(buildPlayerGeoJSON());
  }
}

if (typeof maplibregl === 'undefined') {
  bootErr('MapLibre GL JS failed to load.\n\nCheck your internet connection or ad blocker.');
} else {
  setP(25, 'Starting map…');
  initMap();
}
