<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swedish Football — Global Footprint</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#006AA7;--yellow:#FFCD00;
  --bg:#07101a;--panel-bg:rgba(5,10,20,.97);
  --text:#ddd8cf;--muted:#4e6275;--border:rgba(255,205,0,.1)
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace}
#globe-wrap{position:fixed;inset:0;cursor:grab}
#globe-wrap:active{cursor:grabbing}

/* Boot */
#boot{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .7s}
#boot.gone{opacity:0;pointer-events:none}
#boot-title{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:.1em;color:var(--yellow)}
#boot-sub{font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin-top:-8px}
#boot-msg{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);min-height:14px}
#boot-bar{width:220px;height:1px;background:rgba(255,255,255,.06)}
#boot-prog{height:100%;width:0;background:var(--yellow);transition:width .35s ease}
#boot-err{font-size:10px;color:#c04a4a;text-align:center;max-width:360px;line-height:1.8;display:none;padding:0 20px;white-space:pre-line;letter-spacing:.04em;margin-top:8px}

/* Header */
#hd{position:fixed;top:24px;left:28px;z-index:90;pointer-events:none;user-select:none}
#hd h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,3.5vw,44px);line-height:.86;letter-spacing:.07em;color:var(--text)}
#hd h1 em{color:var(--yellow);font-style:normal;display:block}
#hd p{margin-top:8px;font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted)}

/* Zoom label */
#zoom-lbl{position:fixed;top:24px;right:26px;z-index:90;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);transition:color .3s}

/* Stats */
#stats{position:fixed;bottom:24px;left:28px;z-index:90;display:flex;gap:22px;pointer-events:none}
.st{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.st strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.04em;color:var(--yellow);line-height:1}

/* Hint */
#hint{position:fixed;bottom:24px;right:26px;z-index:90;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);opacity:0;animation:fadeHint 8s ease 3s forwards}
@keyframes fadeHint{0%{opacity:0}15%{opacity:.7}75%{opacity:.7}100%{opacity:.15}}

/* Live badge */
#live-tag{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:90;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);opacity:0;transition:opacity .5s;white-space:nowrap}
#live-tag.show{opacity:1}
#live-tag.done{color:#4aaa77}

/* Flag deco */
.flag{position:fixed;bottom:76px;right:26px;width:32px;height:21px;opacity:.08;z-index:89}
.flag::before{content:'';position:absolute;top:50%;left:0;right:0;height:3px;background:var(--yellow);transform:translateY(-50%)}
.flag::after{content:'';position:absolute;left:9px;top:0;bottom:0;width:3px;background:var(--yellow)}

/* Tier key */
#tiers{position:fixed;top:50%;right:26px;transform:translateY(-50%);z-index:90;display:flex;flex-direction:column;gap:9px;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);pointer-events:none}
.td{display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Panel */
#panel{position:fixed;top:0;right:0;width:min(360px,100vw);height:100%;background:var(--panel-bg);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-left:1px solid var(--border);z-index:200;transform:translateX(102%);transition:transform .42s cubic-bezier(.22,1,.36,1);overflow-y:auto;overflow-x:hidden}
#panel.open{transform:translateX(0)}
#pcls{position:sticky;top:0;float:right;margin:14px 14px 0 0;width:26px;height:26px;background:none;border:1px solid rgba(255,255,255,.07);color:var(--text);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s;font-family:'Space Mono',monospace;z-index:201}
#pcls:hover{border-color:var(--yellow);color:var(--yellow)}
#pbody{padding:46px 22px 54px;clear:both}
.pc-tag{font-size:8px;letter-spacing:.26em;text-transform:uppercase;color:var(--yellow);margin-bottom:3px}
.pc-club{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:.9;letter-spacing:.05em;margin-bottom:3px}
.pc-loc{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
.divider{width:28px;height:1px;background:var(--yellow);margin-bottom:16px;opacity:.7}
.ply{padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:padding-left .16s}
.ply:hover{padding-left:4px}
.ply-num{font-size:8px;color:var(--muted);letter-spacing:.08em;margin-bottom:1px}
.ply-name{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.05em;line-height:1}
.ply-name.legend{color:var(--yellow)}
.ply-name.star{color:#8ab8d0}
.ply-meta{font-size:8px;color:var(--muted);margin-top:2px;letter-spacing:.05em}
.ply-exp{display:none;margin-top:8px;padding:9px 11px;background:rgba(255,205,0,.025);border-left:2px solid rgba(255,205,0,.35);font-size:10px;line-height:1.8;color:#7a8e9e}
.ply-exp.open{display:block}
.exp-stats{display:flex;gap:14px;margin-top:8px}
.es{font-size:8px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.es strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text);line-height:1.1}

@media(max-width:520px){
  #hd{top:14px;left:14px}
  #stats{bottom:14px;left:14px;gap:14px}
  #hint,#tiers{display:none}
  #zoom-lbl{top:14px;right:14px}
}
</style>
</head>

<div id="hint">Scroll to zoom · Click to explore</div>
<div class="flag"></div>

</div>

<div id="panel">
  <button id="pcls" onclick="closePanel()">✕</button>
  <div id="pbody"></div>
</div>

// ── boot helpers ──────────────────────────────────────────────────
const $prog=document.getElementById('boot-prog');
const $msg =document.getElementById('boot-msg');
function setP(pct,msg){$prog.style.width=pct+'%';if(msg)$msg.textContent=msg}
function bootErr(msg){
  const e=document.getElementById('boot-err');
  e.style.display='block';e.textContent=msg;
  $msg.textContent='Failed to load';$prog.style.background='#c04a4a';
}
setP(8,'Loading 3D engine…');

function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src;s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });
}
async function loadGlobeLib(){
  for(const cdn of[
    'https://unpkg.com/globe.gl@2/dist/globe.gl.min.js',
    'https://cdn.jsdelivr.net/npm/globe.gl@2/dist/globe.gl.min.js'
  ]){
    try{await loadScript(cdn);return true}catch(e){console.warn('CDN fail',cdn)}
  }
  return false;
}

// ================================================================
//  BUILD MARKERS
// ================================================================
const clubPlayers={};
PLAYERS.forEach(p=>{
  p.clubs.forEach(c=>{
    if(!CLUBS[c]) return;
    if(!clubPlayers[c]) clubPlayers[c]=[];
    if(!clubPlayers[c].find(x=>x.name===p.name)) clubPlayers[c].push(p);
  });
});
Object.keys(clubPlayers).forEach(c=>clubPlayers[c].sort((a,b)=>b.influence-a.influence));

const allMarkers=Object.keys(clubPlayers).map(cName=>{
  const cl=CLUBS[cName],pl=clubPlayers[cName];
  return{id:cName,lat:cl.lat,lng:cl.lng,city:cl.city,country:cl.country,
    stadium:cl.stadium,players:pl,topPlayer:pl[0],influence:pl[0].influence};
});

function updateStats(){
  document.getElementById('s-ply').textContent=new Set(PLAYERS.map(p=>p.name)).size;
  document.getElementById('s-clubs').textContent=allMarkers.length;
  document.getElementById('s-cnt').textContent=new Set(Object.values(CLUBS).map(c=>c.country)).size;
}
updateStats();

// ================================================================
//  ZOOM TIERS
// ================================================================
const TIERS=[
  {maxAlt:0.6, minInf:0,  label:"Stadium View"},
  {maxAlt:1.2, minInf:40, label:"Regional"},
  {maxAlt:2.0, minInf:65, label:"Continental"},
  {maxAlt:99,  minInf:85, label:"World View"},
];
function getTier(alt){return TIERS.find(t=>alt<=t.maxAlt)||TIERS[TIERS.length-1]}
function getVisible(alt){return allMarkers.filter(m=>m.influence>=getTier(alt).minInf)}

// Point radius scales with zoom: smaller when zoomed in, larger when zoomed out
function markerRadius(m,alt){
  const base=m.influence>=85?.28:m.influence>=65?.18:m.influence>=40?.11:.07;
  // scale factor: at alt=2.2 → ×1, at alt=0.3 → ×0.25
  const scale=Math.max(0.22,Math.min(1.0, alt/2.2));
  return base*scale;
}

function markerColor(m){
  const i=m.influence;
  return i>=85?'#FFCD00':i>=65?'#7ab6d0':i>=40?'#3d7a99':'#243d4d';
}

function markerLabel(m){
  const p=m.topPlayer;
  const extra=m.players.length>1
    ?`<br><span style="font-size:9px;color:#4e6275">+${m.players.length-1} more Swedish players</span>`:'';
  return`<div style="font-family:monospace;background:rgba(5,10,20,.96);border:1px solid rgba(255,205,0,.2);padding:9px 13px;line-height:1.6;white-space:nowrap;border-radius:1px">
<div style="font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#FFCD00;margin-bottom:1px">${m.stadium||m.city} · ${m.country}</div>
<div style="font-size:15px;font-weight:700;color:#ddd8cf;margin-bottom:1px">${p.name}</div>
<div style="font-size:9px;color:#4e6275">${p.pos} · ${p.caps} caps · Born ${p.born}</div>${extra}</div>`;
}

// ================================================================
//  GLOBE
// ================================================================
let globe, currentAlt=2.2;

function initGlobe(){
  setP(60,'Building globe…');
  try{
    globe=Globe()(document.getElementById('globe-wrap'))
      // Blue marble — sharp, clean, no pixelation
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
      .atmosphereColor('#2a6aaa')
      .atmosphereAltitude(0.14)
      // Points
      .pointsData(getVisible(currentAlt))
      .pointLat(m=>m.lat)
      .pointLng(m=>m.lng)
      .pointColor(m=>markerColor(m))
      .pointRadius(m=>markerRadius(m,currentAlt))
      .pointAltitude(0.008)
      .pointLabel(m=>markerLabel(m))
      .onPointClick(m=>openPanel(m))
      // Rings on legends
      .ringsData(allMarkers.filter(m=>m.influence>=85))
      .ringLat(m=>m.lat).ringLng(m=>m.lng)
      .ringColor(()=>'rgba(255,205,0,0.4)')
      .ringMaxRadius(1.8).ringPropagationSpeed(0.8).ringRepeatPeriod(1100)
      // Arcs from Stockholm to legends
      .arcsData(allMarkers.filter(m=>m.influence>=85))
      .arcStartLat(()=>59.33).arcStartLng(()=>18.07)
      .arcEndLat(m=>m.lat).arcEndLng(m=>m.lng)
      .arcColor(()=>['rgba(0,106,167,0)','rgba(255,205,0,.28)','rgba(0,106,167,0)'])
      .arcDashLength(0.3).arcDashGap(0.15).arcDashAnimateTime(4500).arcStroke(0.35)
      .pointOfView({lat:51,lng:12,altitude:2.2},1800);

    globe.controls().autoRotate=true;
    globe.controls().autoRotateSpeed=0.2;
    globe.controls().enableDamping=true;
    globe.controls().dampingFactor=0.08;
    globe.controls().addEventListener('start',()=>{globe.controls().autoRotate=false});

    let debTm;
    globe.controls().addEventListener('change',()=>{
      clearTimeout(debTm);
      debTm=setTimeout(()=>{
        const alt=globe.pointOfView().altitude;
        if(Math.abs(alt-currentAlt)>0.03){
          currentAlt=alt;
          const tier=getTier(alt);
          // refresh data AND recalculate radius for new zoom level
          globe
            .pointsData(getVisible(alt))
            .pointRadius(m=>markerRadius(m,alt));
          document.getElementById('zoom-lbl').textContent=tier.label;
        }
      },100);
    });

    setP(100,'');
    setTimeout(()=>document.getElementById('boot').classList.add('gone'),500);
    fetchWikidata();

  }catch(err){
    console.error('Globe error:',err);
    bootErr('Globe failed to initialize.\n\nError: '+err.message+'\n\nTry refreshing or opening in an incognito window.');
  }
}

//  PANEL
// ================================================================
function openPanel(m){
  document.getElementById('pbody').innerHTML=`
    <div class="pc-tag">${m.country}</div>
    <div class="pc-club">${m.id}</div>
    <div class="pc-loc">${m.stadium||m.city} · ${m.players.length} Swedish ${m.players.length===1?'player':'players'}</div>
    <div class="divider"></div>
    ${m.players.map((p,i)=>plyHtml(p,i,m.id)).join('')}
    <div style="margin-top:20px;font-size:8px;color:#1e2e38;letter-spacing:.12em;text-transform:uppercase">Curated + live Wikidata</div>`;
  document.getElementById('panel').classList.add('open');
  globe.controls().autoRotate=false;
}
function plyHtml(p,i,cid){
  const cls=p.influence>=85?'legend':p.influence>=65?'star':'';
  const id=`px_${cid.replace(/\W/g,'_')}_${i}`;
  return`<div class="ply" onclick="toggleExp('${id}')">
    <div class="ply-num">${String(i+1).padStart(2,'0')} · ${p.pos}${p.active?' · <span style="color:#3aaa66">Active</span>':''}</div>
    <div class="ply-name ${cls}">${p.name}</div>
    <div class="ply-meta">${p.born} · ${p.caps} caps · ${p.goals} goals</div>
    <div class="ply-exp" id="${id}">${p.bio}
      <div class="exp-stats">
        <div class="es"><strong>${p.caps}</strong>Caps</div>
        <div class="es"><strong>${p.goals}</strong>Goals</div>
        <div class="es"><strong>${p.born}</strong>Born</div>
      </div>
    </div>
  </div>`;
}
function toggleExp(id){document.getElementById(id)?.classList.toggle('open')}
function closePanel(){document.getElementById('panel').classList.remove('open')}
window.closePanel=closePanel;

//  WIKIDATA
// ================================================================
async function fetchWikidata(){
  const lt=document.getElementById('live-tag');
  lt.classList.add('show');
  const q=`SELECT DISTINCT ?player ?playerLabel ?club ?clubLabel ?countryLabel ?lat ?lon ?caps WHERE {
  ?player wdt:P27 wd:Q34;wdt:P106 wd:Q937857;wdt:P54 ?club.
  ?club wdt:P625 ?coord;wdt:P17 ?country.
  FILTER(?country NOT IN (wd:Q34,wd:Q33,wd:Q35,wd:Q20,wd:Q189))
  BIND(geof:latitude(?coord) AS ?lat)BIND(geof:longitude(?coord) AS ?lon)
  OPTIONAL{?player wdt:P1350 ?caps}
  SERVICE wikibase:label{bd:serviceParam wikibase:language "en"}
} LIMIT 1500`;
  try{
    const r=await fetch(`https://query.wikidata.org/sparql?query=${encodeURIComponent(q)}&format=json`,
      {headers:{'Accept':'application/sparql-results+json'}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    mergeWikidata(j.results.bindings);
    lt.textContent='✓ Live data loaded';
    lt.classList.add('done');
    setTimeout(()=>lt.classList.remove('show'),3000);
  }catch(e){
    console.warn('Wikidata:',e);
    lt.textContent='Using curated data';
    setTimeout(()=>lt.classList.remove('show'),3000);
  }
}
function mergeWikidata(bindings){
  const known=new Set(PLAYERS.map(p=>p.name.toLowerCase()));
  let added=0;
  bindings.forEach(b=>{
    const pN=b.playerLabel?.value,cN=b.clubLabel?.value;
    const lat=parseFloat(b.lat?.value),lon=parseFloat(b.lon?.value);
    const caps=parseInt(b.caps?.value)||0;
    if(!pN||!cN||isNaN(lat)||isNaN(lon)) return;
    if(known.has(pN.toLowerCase())) return;
    const inf=Math.min(55,Math.max(12,Math.round(caps*0.6)));
    let ck=Object.keys(CLUBS).find(k=>k.toLowerCase()===cN.toLowerCase());
    if(!ck){ck=cN;CLUBS[ck]={lat,lng:lon,city:cN,country:b.countryLabel?.value||'?',stadium:cN};}
    const np={name:pN,influence:inf,caps,goals:0,born:'?',pos:'Player',active:false,
      bio:`Swedish international. ${caps} caps. Source: Wikidata.`,clubs:[ck]};
    PLAYERS.push(np);known.add(pN.toLowerCase());
    if(!clubPlayers[ck]) clubPlayers[ck]=[];
    clubPlayers[ck].push(np);
    clubPlayers[ck].sort((a,b)=>b.influence-a.influence);
    const ex=allMarkers.find(m=>m.id===ck);
    if(ex){ex.players=clubPlayers[ck];ex.topPlayer=clubPlayers[ck][0];ex.influence=Math.max(ex.influence,ex.topPlayer.influence);}
    else{const cl=CLUBS[ck];allMarkers.push({id:ck,lat:cl.lat,lng:cl.lng,city:cl.city,country:cl.country,stadium:cl.stadium,players:clubPlayers[ck],topPlayer:clubPlayers[ck][0],influence:clubPlayers[ck][0].influence});}
    added++;
  });
  if(added>0){updateStats();globe.pointsData(getVisible(currentAlt)).pointRadius(m=>markerRadius(m,currentAlt));}
}
