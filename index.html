<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swedish Football — Global Footprint</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#006AA7;--yellow:#FFCD00;
  --bg:#04080f;--panel-bg:rgba(6,10,20,.96);
  --text:#ddd8cf;--muted:#5a6e82;--border:rgba(255,205,0,.1)
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace}
#globe-wrap{position:fixed;inset:0;cursor:grab}
#globe-wrap:active{cursor:grabbing}

/* Loading screen */
#boot{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:opacity .8s;
}
#boot.gone{opacity:0;pointer-events:none}
#boot-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:.08em;color:var(--yellow)}
#boot-msg{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
#boot-bar{width:200px;height:2px;background:rgba(255,255,255,.06)}
#boot-prog{height:100%;width:0;background:var(--yellow);transition:width .4s}
#boot-err{font-size:10px;color:#c04a4a;letter-spacing:.08em;text-align:center;max-width:380px;line-height:1.7;display:none;padding:0 20px;white-space:pre-line}

/* Header */
#hd{position:fixed;top:26px;left:30px;z-index:90;pointer-events:none;user-select:none}
#hd h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,3.8vw,48px);line-height:.88;letter-spacing:.06em;color:var(--text)}
#hd h1 em{color:var(--yellow);font-style:normal;display:block}
#hd p{margin-top:9px;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
#zoom-lbl{position:fixed;top:28px;right:28px;z-index:90;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}

/* Stats */
#stats{position:fixed;bottom:26px;left:30px;z-index:90;display:flex;gap:24px;pointer-events:none}
.st{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.st strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.04em;color:var(--yellow);line-height:1.05}

/* Hint */
#hint{position:fixed;bottom:26px;right:28px;z-index:90;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);opacity:0;animation:fadeHint 7s ease 3s forwards}
@keyframes fadeHint{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:.2}}

/* Live tag */
#live-tag{position:fixed;top:26px;left:50%;transform:translateX(-50%);z-index:90;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);opacity:0;transition:opacity .6s}
#live-tag.show{opacity:1}
#live-tag.done{color:#4aaa77}

/* Flag deco */
.flag{position:fixed;bottom:80px;right:28px;width:34px;height:22px;opacity:.1;z-index:89}
.flag::before{content:'';position:absolute;top:50%;left:0;right:0;height:3px;background:var(--yellow);transform:translateY(-50%)}
.flag::after{content:'';position:absolute;left:10px;top:0;bottom:0;width:3px;background:var(--yellow)}

/* Tier legend */
#tiers{position:fixed;top:50%;right:28px;transform:translateY(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);pointer-events:none}
.tier-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle}

/* Panel */
#panel{position:fixed;top:0;right:0;width:min(360px,100vw);height:100%;background:var(--panel-bg);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-left:1px solid var(--border);z-index:200;transform:translateX(102%);transition:transform .44s cubic-bezier(.22,1,.36,1);overflow-y:auto;overflow-x:hidden}
#panel.open{transform:translateX(0)}
#pcls{position:sticky;top:0;float:right;margin:16px 16px 0 0;width:28px;height:28px;background:none;border:1px solid rgba(255,255,255,.08);color:var(--text);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s;font-family:'Space Mono',monospace;z-index:201}
#pcls:hover{border-color:var(--yellow);color:var(--yellow)}
#pbody{padding:48px 24px 56px;clear:both}
.pc-tag{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--yellow);margin-bottom:4px}
.pc-club{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:.92;letter-spacing:.05em;margin-bottom:4px}
.pc-loc{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
.divider{width:34px;height:2px;background:var(--yellow);margin-bottom:18px}
.ply{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:padding-left .18s}
.ply:hover{padding-left:5px}
.ply-num{font-size:9px;color:var(--muted);letter-spacing:.08em;margin-bottom:2px}
.ply-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.05em;line-height:1}
.ply-name.legend{color:var(--yellow)}
.ply-name.star{color:#9bbfd4}
.ply-meta{font-size:9px;color:var(--muted);margin-top:3px;letter-spacing:.06em}
.ply-exp{display:none;margin-top:9px;padding:10px 12px;background:rgba(255,205,0,.03);border-left:2px solid rgba(255,205,0,.4);font-size:10px;line-height:1.78;color:var(--muted)}
.ply-exp.open{display:block}
.exp-stats{display:flex;gap:16px;margin-top:8px}
.es{font-size:9px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.es strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);line-height:1.1}

@media(max-width:520px){
  #hd{top:16px;left:16px}
  #stats{bottom:16px;left:16px;gap:16px}
  #hint,#tiers{display:none}
  #zoom-lbl{top:16px;right:16px}
}
</style>
</head>

<script>
// ── Progress ────────────────────────────────────────────────────
const prog=document.getElementById('boot-prog');
const bootMsg=document.getElementById('boot-msg');
function setProgress(pct,msg){
  prog.style.width=pct+'%';
  if(msg) bootMsg.textContent=msg;
}
function showBootError(msg){
  const e=document.getElementById('boot-err');
  e.style.display='block';
  e.textContent=msg;
  bootMsg.textContent='Something went wrong';
  prog.style.background='#c04a4a';
}
setProgress(10,'Loading 3D library…');

// ── Dynamic script loader ────────────────────────────────────────
function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}
async function loadGlobeLib(){
  const cdns=[
    'https://unpkg.com/globe.gl@2/dist/globe.gl.min.js',
    'https://cdn.jsdelivr.net/npm/globe.gl@2/dist/globe.gl.min.js',
  ];
  for(const cdn of cdns){
    try{ await loadScript(cdn); console.log('Loaded from',cdn); return true; }
    catch(e){ console.warn('CDN failed:',cdn,e); }
  }
  return false;
}

// ================================================================
// BUILD MARKERS
// ================================================================
const clubPlayers={};
PLAYERS.forEach(p=>{
  p.clubs.forEach(c=>{
    if(!CLUBS[c]) return;
    if(!clubPlayers[c]) clubPlayers[c]=[];
    if(!clubPlayers[c].find(x=>x.name===p.name)) clubPlayers[c].push(p);
  });
});
Object.keys(clubPlayers).forEach(c=>{
  clubPlayers[c].sort((a,b)=>b.influence-a.influence);
});
const allMarkers=Object.keys(clubPlayers).map(cName=>{
  const cl=CLUBS[cName],pl=clubPlayers[cName];
  return{id:cName,lat:cl.lat,lng:cl.lng,city:cl.city,country:cl.country,
    players:pl,topPlayer:pl[0],influence:pl[0].influence};
});

function updateStats(){
  document.getElementById('s-ply').textContent=new Set(PLAYERS.map(p=>p.name)).size;
  document.getElementById('s-clubs').textContent=allMarkers.length;
  document.getElementById('s-cnt').textContent=new Set(Object.values(CLUBS).map(c=>c.country)).size;
}
updateStats();

// ================================================================
// TIERS
// ================================================================
const TIERS=[
  {maxAlt:0.6,minInf:0,label:"City View"},
  {maxAlt:1.2,minInf:40,label:"Regional"},
  {maxAlt:2.0,minInf:65,label:"Continental"},
  {maxAlt:99, minInf:85,label:"World View"},
];
function getTier(alt){return TIERS.find(t=>alt<=t.maxAlt)||TIERS[TIERS.length-1]}
function getVisible(alt){return allMarkers.filter(m=>m.influence>=getTier(alt).minInf)}
function markerColor(m){const i=m.influence;return i>=85?'#FFCD00':i>=65?'#7bb8d4':i>=40?'#4a7a99':'#2d5060'}
function markerRadius(m){const i=m.influence;return i>=85?.55:i>=65?.38:i>=40?.27:.18}
function markerLabel(m){
  const p=m.topPlayer;
  const extra=m.players.length>1?`<br><span style="color:#5a6e82;font-size:9px">+${m.players.length-1} more</span>`:'';
  return`<div style="font-family:monospace;background:rgba(4,8,15,.95);border:1px solid rgba(255,205,0,.25);padding:8px 12px;line-height:1.6;white-space:nowrap;border-radius:2px"><div style="font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#FFCD00">${m.city} · ${m.country}</div><div style="font-size:14px;font-weight:bold;color:#ddd8cf;margin:2px 0">${p.name}</div><div style="font-size:9px;color:#5a6e82">${p.pos} · ${p.caps} caps · Born ${p.born}</div>${extra}</div>`;
}

// ================================================================
// GLOBE
// ================================================================
let globe,currentAlt=2.2;

function initGlobe(){
  setProgress(60,'Building globe…');
  try{
    globe=Globe()(document.getElementById('globe-wrap'))
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
      .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
      .atmosphereColor('#1a4a8a')
      .atmosphereAltitude(0.16)
      .pointsData(getVisible(currentAlt))
      .pointLat(m=>m.lat).pointLng(m=>m.lng)
      .pointColor(m=>markerColor(m)).pointRadius(m=>markerRadius(m))
      .pointAltitude(0.012).pointLabel(m=>markerLabel(m))
      .onPointClick(m=>openPanel(m))
      .ringsData(allMarkers.filter(m=>m.influence>=85))
      .ringLat(m=>m.lat).ringLng(m=>m.lng)
      .ringColor(()=>'rgba(255,205,0,0.5)')
      .ringMaxRadius(2.5).ringPropagationSpeed(1).ringRepeatPeriod(900)
      .arcsData(allMarkers.filter(m=>m.influence>=85))
      .arcStartLat(()=>59.33).arcStartLng(()=>18.07)
      .arcEndLat(m=>m.lat).arcEndLng(m=>m.lng)
      .arcColor(()=>['rgba(0,106,167,0)','rgba(255,205,0,0.35)','rgba(0,106,167,0)'])
      .arcDashLength(0.35).arcDashGap(0.18).arcDashAnimateTime(4000).arcStroke(0.4)
      .pointOfView({lat:51,lng:14,altitude:2.2},2000);

    globe.controls().autoRotate=true;
    globe.controls().autoRotateSpeed=0.25;
    globe.controls().enableDamping=true;
    globe.controls().addEventListener('start',()=>{globe.controls().autoRotate=false});

    let debTm;
    globe.controls().addEventListener('change',()=>{
      clearTimeout(debTm);
      debTm=setTimeout(()=>{
        const alt=globe.pointOfView().altitude;
        if(Math.abs(alt-currentAlt)>0.04){
          currentAlt=alt;
          globe.pointsData(getVisible(alt));
          document.getElementById('zoom-lbl').textContent=getTier(alt).label;
        }
      },120);
    });

    setProgress(100,'Ready');
    setTimeout(()=>document.getElementById('boot').classList.add('gone'),500);
    fetchWikidata();

  }catch(err){
    console.error('Globe error:',err);
    showBootError('Globe failed to initialize.\n\nError: '+err.message+'\n\nTry refreshing or opening in an incognito window.');
  }
}

// ================================================================
// PANEL
// ================================================================
function openPanel(m){
  document.getElementById('pbody').innerHTML=`
    <div class="pc-tag">${m.country}</div>
    <div class="pc-club">${m.id}</div>
    <div class="pc-loc">${m.city} · ${m.players.length} Swedish ${m.players.length===1?'player':'players'}</div>
    <div class="divider"></div>
    ${m.players.map((p,i)=>plyHtml(p,i,m.id)).join('')}
    <div style="margin-top:22px;font-size:8px;color:#2d3d4a;letter-spacing:.12em;text-transform:uppercase">Curated data + live Wikidata</div>`;
  document.getElementById('panel').classList.add('open');
  globe.controls().autoRotate=false;
}
function plyHtml(p,i,cid){
  const cls=p.influence>=85?'legend':p.influence>=65?'star':'';
  const id=`px_${cid.replace(/\W/g,'_')}_${i}`;
  return`<div class="ply" onclick="toggleExp('${id}')">
    <div class="ply-num">${String(i+1).padStart(2,'0')} · ${p.pos}${p.active?' · <span style="color:#4aaa77">Active</span>':''}</div>
    <div class="ply-name ${cls}">${p.name}</div>
    <div class="ply-meta">${p.born} · ${p.caps} caps · ${p.goals} goals</div>
    <div class="ply-exp" id="${id}">${p.bio}
      <div class="exp-stats">
        <div class="es"><strong>${p.caps}</strong>Caps</div>
        <div class="es"><strong>${p.goals}</strong>Goals</div>
        <div class="es"><strong>${p.born}</strong>Born</div>
      </div>
    </div>
  </div>`;
}
function toggleExp(id){document.getElementById(id)?.classList.toggle('open')}
function closePanel(){document.getElementById('panel').classList.remove('open')}
window.closePanel=closePanel;
window.toggleExp=toggleExp;

// ================================================================
// WIKIDATA
// ================================================================
async function fetchWikidata(){
  const lt=document.getElementById('live-tag');
  lt.classList.add('show');
  const q=`SELECT DISTINCT ?player ?playerLabel ?club ?clubLabel ?countryLabel ?lat ?lon ?caps WHERE {
  ?player wdt:P27 wd:Q34;wdt:P106 wd:Q937857;wdt:P54 ?club.
  ?club wdt:P625 ?coord;wdt:P17 ?country.
  FILTER(?country NOT IN (wd:Q34,wd:Q33,wd:Q35,wd:Q20,wd:Q189))
  BIND(geof:latitude(?coord) AS ?lat)BIND(geof:longitude(?coord) AS ?lon)
  OPTIONAL{?player wdt:P1350 ?caps}
  SERVICE wikibase:label{bd:serviceParam wikibase:language "en"}
} LIMIT 1200`;
  try{
    const r=await fetch(`https://query.wikidata.org/sparql?query=${encodeURIComponent(q)}&format=json`,
      {headers:{'Accept':'application/sparql-results+json'}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    mergeWikidata(j.results.bindings);
    lt.textContent='✓ Live data loaded';
    lt.classList.add('done');
    setTimeout(()=>lt.classList.remove('show'),3000);
  }catch(e){
    console.warn('Wikidata fail:',e);
    lt.textContent='Offline — using curated data';
    setTimeout(()=>lt.classList.remove('show'),3000);
  }
}
function mergeWikidata(bindings){
  const known=new Set(PLAYERS.map(p=>p.name.toLowerCase()));
  let added=0;
  bindings.forEach(b=>{
    const pName=b.playerLabel?.value,cName=b.clubLabel?.value;
    const lat=parseFloat(b.lat?.value),lon=parseFloat(b.lon?.value);
    const caps=parseInt(b.caps?.value)||0;
    if(!pName||!cName||isNaN(lat)||isNaN(lon)) return;
    if(known.has(pName.toLowerCase())) return;
    const inf=Math.min(55,Math.max(12,Math.round(caps*0.6)));
    let ck=Object.keys(CLUBS).find(k=>k.toLowerCase()===cName.toLowerCase());
    if(!ck){ck=cName;CLUBS[ck]={lat,lng:lon,city:cName,country:b.countryLabel?.value||'Unknown'};}
    const np={name:pName,influence:inf,caps,goals:0,born:'?',pos:'Player',active:false,
      bio:`Swedish international. ${caps} international caps. Source: Wikidata.`,clubs:[ck],fromWikidata:true};
    PLAYERS.push(np);known.add(pName.toLowerCase());
    if(!clubPlayers[ck]) clubPlayers[ck]=[];
    clubPlayers[ck].push(np);
    clubPlayers[ck].sort((a,b)=>b.influence-a.influence);
    const ex=allMarkers.find(m=>m.id===ck);
    if(ex){ex.players=clubPlayers[ck];ex.topPlayer=clubPlayers[ck][0];ex.influence=Math.max(ex.influence,ex.topPlayer.influence);}
    else{const cl=CLUBS[ck];allMarkers.push({id:ck,lat:cl.lat,lng:cl.lng,city:cl.city,country:cl.country,players:clubPlayers[ck],topPlayer:clubPlayers[ck][0],influence:clubPlayers[ck][0].influence});}
    added++;
  });
  if(added>0){updateStats();globe.pointsData(getVisible(currentAlt));}
}

      '  • A firewall is blocking unpkg.com or jsdelivr.net\n\n' +
      'Try: opening in an incognito/private window, or disabling extensions.'
    );
    return;
  }
  setProgress(50,'Library ready…');
  setTimeout(initGlobe,150);
})();
