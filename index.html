<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swedish Football — Global Footprint</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --yellow:#FFCD00;--blue:#006AA7;
  --bg:#07101a;--panel:#060d18;
  --text:#d8d2c8;--muted:#43596e;--border:rgba(255,205,0,.09)
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Space Mono',monospace;color:var(--text)}
#map{position:fixed;inset:0}

/* Boot */
#boot{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .7s}
#boot.gone{opacity:0;pointer-events:none}
#boot-logo{font-family:'Bebas Neue',sans-serif;font-size:54px;letter-spacing:.1em;color:var(--yellow);line-height:1}
#boot-sub{font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted)}
#boot-msg{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);min-height:14px}
#boot-bar{width:220px;height:1px;background:rgba(255,255,255,.06)}
#boot-prog{height:100%;width:0;background:var(--yellow);transition:width .3s ease}
#boot-err{font-size:10px;color:#c04a4a;text-align:center;max-width:360px;line-height:1.8;display:none;padding:0 20px;white-space:pre-line;margin-top:8px}

/* Header */
#hd{position:fixed;top:22px;left:26px;z-index:90;pointer-events:none;user-select:none}
#hd h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,3.2vw,40px);line-height:.86;letter-spacing:.07em;color:var(--text)}
#hd h1 em{color:var(--yellow);font-style:normal;display:block}
#hd p{margin-top:7px;font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted)}

/* Zoom label */
#zlbl{position:fixed;top:22px;right:24px;z-index:90;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);transition:color .3s}

/* Stats */
#stats{position:fixed;bottom:22px;left:26px;z-index:90;display:flex;gap:20px;pointer-events:none}
.st{font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
.st strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:23px;letter-spacing:.04em;color:var(--yellow);line-height:1}

/* Hint */
#hint{position:fixed;bottom:22px;right:24px;z-index:90;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);opacity:0;animation:fh 8s ease 3.5s forwards}
@keyframes fh{0%{opacity:0}15%{opacity:.6}75%{opacity:.6}100%{opacity:.12}}

/* Live badge */
#live{position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:90;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);opacity:0;transition:opacity .4s;white-space:nowrap}
#live.on{opacity:1}
#live.ok{color:#3aaa66}

/* Tier key */
#tiers{position:fixed;top:50%;right:24px;transform:translateY(-50%);z-index:90;display:flex;flex-direction:column;gap:9px;pointer-events:none}
.tk{display:flex;align-items:center;gap:7px;font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
.tk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Panel */
#panel{position:fixed;top:0;right:0;width:min(360px,100vw);height:100%;background:var(--panel);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-left:1px solid var(--border);z-index:200;transform:translateX(102%);transition:transform .4s cubic-bezier(.22,1,.36,1);overflow-y:auto;overflow-x:hidden}
#panel.open{transform:translateX(0)}
#pcls{position:sticky;top:0;float:right;margin:14px 14px 0 0;width:26px;height:26px;background:none;border:1px solid rgba(255,255,255,.07);color:var(--text);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s;font-family:'Space Mono',monospace;z-index:201}
#pcls:hover{border-color:var(--yellow);color:var(--yellow)}
#pbody{padding:46px 22px 54px;clear:both}
.pc-tag{font-size:8px;letter-spacing:.26em;text-transform:uppercase;color:var(--yellow);margin-bottom:3px}
.pc-club{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:.9;letter-spacing:.05em;margin-bottom:2px}
.pc-loc{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.divider{width:26px;height:1px;background:var(--yellow);margin-bottom:14px;opacity:.7}
.ply{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:padding-left .15s}
.ply:hover{padding-left:4px}
.ply-rank{font-size:8px;color:var(--muted);letter-spacing:.07em;margin-bottom:1px}
.ply-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.05em;line-height:1}
.ply-name.legend{color:var(--yellow)}
.ply-name.star{color:#80b4cc}
.ply-meta{font-size:8px;color:var(--muted);margin-top:2px;letter-spacing:.05em}
.ply-bio{display:none;margin-top:7px;padding:8px 10px;background:rgba(255,205,0,.025);border-left:2px solid rgba(255,205,0,.3);font-size:9px;line-height:1.8;color:#627a8a}
.ply-bio.open{display:block}
.bio-row{display:flex;gap:12px;margin-top:7px}
.bs{font-size:8px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.bs strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--text);line-height:1.1}

/* MapLibre overrides */
.maplibregl-ctrl-bottom-right,.maplibregl-ctrl-bottom-left{display:none}
.maplibregl-ctrl-top-right,.maplibregl-ctrl-top-left{display:none}
.maplibregl-popup{max-width:280px!important}
.maplibregl-popup-content{background:rgba(5,10,20,.97);border:1px solid rgba(255,205,0,.18);border-radius:2px;padding:10px 13px;font-family:'Space Mono',monospace;box-shadow:0 8px 32px rgba(0,0,0,.7)}
.maplibregl-popup-tip{border-top-color:rgba(255,205,0,.18)!important;border-bottom-color:rgba(5,10,20,.97)!important}
.maplibregl-popup-close-button{color:var(--muted);font-size:14px;right:6px;top:4px}
.maplibregl-popup-close-button:hover{color:var(--yellow);background:none}
.pop-country{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--yellow);margin-bottom:2px}
.pop-club{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.05em;line-height:1;color:var(--text);margin-bottom:2px}
.pop-player{font-size:9px;color:#80b4cc;margin-bottom:1px}
.pop-meta{font-size:8px;color:var(--muted)}
.pop-more{font-size:8px;color:var(--muted);margin-top:3px;font-style:italic}
.pop-cta{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--yellow);cursor:pointer;margin-top:5px;opacity:.8}
.pop-cta:hover{opacity:1}

@media(max-width:520px){
  #hd{top:12px;left:12px}
  #stats{bottom:12px;left:12px;gap:12px}
  #hint,#tiers{display:none}
  #zlbl{top:12px;right:12px}
}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">SWEDISH<br>FOOTBALL</div>
  <div id="boot-sub">Global Footprint · All Time</div>
  <div id="boot-msg">Loading map engine…</div>
  <div id="boot-bar"><div id="boot-prog"></div></div>
  <div id="boot-err"></div>
</div>

<div id="map"></div>

<div id="hd">
  <h1>SWEDISH<em>FOOTBALL</em></h1>
  <p>Global Footprint · All Time</p>
</div>
<div id="zlbl">World View</div>
<div id="live">⟳ Fetching live data…</div>

<div id="stats">
  <div class="st"><strong id="s-ply">—</strong>Players</div>
  <div class="st"><strong id="s-clubs">—</strong>Clubs</div>
  <div class="st"><strong id="s-cnt">—</strong>Nations</div>
</div>
<div id="hint">Drag to rotate · Scroll to zoom · Click markers</div>

<div id="tiers">
  <div class="tk"><div class="tk-dot" style="background:#FFCD00"></div>Legend</div>
  <div class="tk"><div class="tk-dot" style="background:#7ab6d0"></div>Star</div>
  <div class="tk"><div class="tk-dot" style="background:#3d7a99"></div>International</div>
  <div class="tk"><div class="tk-dot" style="background:#1e3d50"></div>Regular</div>
</div>

<div id="panel">
  <button id="pcls" onclick="closePanel()">✕</button>
  <div id="pbody"></div>
</div>

<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>

// ================================================================
//  BUILD GeoJSON
// ================================================================
const clubMap = {};    // clubName → {…club, players:[]}
const seenNames = new Set();

PLAYERS.forEach(p => {
  if (seenNames.has(p.name)) return;
  seenNames.add(p.name);
  p.clubs.forEach(c => {
    if (!CLUBS[c]) return;
    if (!clubMap[c]) clubMap[c] = { ...CLUBS[c], clubName: c, players: [] };
    clubMap[c].players.push(p);
  });
});

// Sort players by influence within each club
Object.values(clubMap).forEach(cm => cm.players.sort((a,b) => b.influence - a.influence));

function tierColor(inf) {
  if (inf >= 85) return '#FFCD00';
  if (inf >= 65) return '#7ab6d0';
  if (inf >= 40) return '#3d7a99';
  return '#1e3d50';
}

function buildGeoJSON() {
  return {
    type: 'FeatureCollection',
    features: Object.values(clubMap).map(cm => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [cm.lng, cm.lat] },
      properties: {
        id: cm.clubName,
        stadium: cm.stadium || cm.city,
        city: cm.city,
        country: cm.country,
        influence: cm.players[0].influence,
        color: tierColor(cm.players[0].influence),
        topName: cm.players[0].name,
        count: cm.players.length,
      }
    }))
  };
}

function buildArcs() {
  const legends = Object.values(clubMap).filter(cm => cm.players[0].influence >= 85);
  return {
    type: 'FeatureCollection',
    features: legends.map(cm => ({
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: [[18.07, 59.33], [cm.lng, cm.lat]] },
      properties: {}
    }))
  };
}

function updateStats() {
  document.getElementById('s-ply').textContent = seenNames.size;
  document.getElementById('s-clubs').textContent = Object.keys(clubMap).length;
  const nations = new Set(Object.values(CLUBS).map(c => c.country));
  document.getElementById('s-cnt').textContent = nations.size;
}
updateStats();

// ================================================================
//  MAP
// ================================================================
setP(30, 'Initialising map…');

let map, rotating = true, currentZoom = 3;

function zoomLabel(z) {
  if (z < 4)  return 'World View';
  if (z < 6)  return 'Continental';
  if (z < 9)  return 'Regional';
  if (z < 12) return 'City View';
  return 'Stadium View';
}

function initMap() {
  try {
    map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/positron',
      center: [14, 50],
      zoom: 3,
      projection: 'globe',
      attributionControl: false,
    });

    map.on('load', onMapLoad);
    map.on('error', e => { console.error('Map error', e); });

  } catch(err) {
    bootErr('Map init failed: ' + err.message);
  }
}

function onMapLoad() {
  setP(80, 'Adding data…');

  // Globe atmosphere
  map.setFog({
    color: 'rgba(180,210,240,0.4)',
    'high-color': 'rgba(120,170,210,0.8)',
    'space-color': '#07101a',
    'star-intensity': 0.5,
    'horizon-blend': 0.04,
  });

  // ── Sources ─────────────────────────────────────────────────────
  map.addSource('clubs', { type: 'geojson', data: buildGeoJSON() });
  map.addSource('arcs',  { type: 'geojson', data: buildArcs()   });

  // ── Arcs ────────────────────────────────────────────────────────
  map.addLayer({
    id: 'arcs',
    type: 'line',
    source: 'arcs',
    paint: {
      'line-color': '#FFCD00',
      'line-width': 0.7,
      'line-opacity': ['interpolate',['linear'],['zoom'], 2, 0.25, 6, 0.0],
    },
    layout: { 'line-cap': 'round' }
  });

  // ── Shadow halo (glow) ───────────────────────────────────────────
  map.addLayer({
    id: 'clubs-halo',
    type: 'circle',
    source: 'clubs',
    paint: {
      'circle-radius': [
        'interpolate', ['linear'], ['zoom'],
        2,  ['*', ['get','influence'], 0.055],
        6,  ['*', ['get','influence'], 0.12],
        10, ['*', ['get','influence'], 0.22],
        14, ['*', ['get','influence'], 0.32],
      ],
      'circle-color': ['get','color'],
      'circle-opacity': 0.12,
      'circle-blur': 1.2,
      // zoom-tier visibility
      'circle-opacity': [
        'step', ['zoom'],
        ['case',['>=',['get','influence'],85],0.15,0], 4,
        ['case',['>=',['get','influence'],65],0.15,0], 6,
        ['case',['>=',['get','influence'],40],0.12,0], 9,
        0.10
      ],
    }
  });

  // ── Main circles ─────────────────────────────────────────────────
  map.addLayer({
    id: 'clubs-dot',
    type: 'circle',
    source: 'clubs',
    paint: {
      'circle-radius': [
        'interpolate', ['linear'], ['zoom'],
        2,  ['*', ['get','influence'], 0.028],
        6,  ['*', ['get','influence'], 0.060],
        10, ['*', ['get','influence'], 0.11],
        14, ['*', ['get','influence'], 0.18],
      ],
      'circle-color': ['get','color'],
      'circle-stroke-color': 'rgba(255,255,255,0.5)',
      'circle-stroke-width': ['interpolate',['linear'],['zoom'], 2, 0.5, 10, 1.5],
      'circle-opacity': [
        'step', ['zoom'],
        ['case',['>=',['get','influence'],85],0.92,0], 4,
        ['case',['>=',['get','influence'],65],0.92,0], 6,
        ['case',['>=',['get','influence'],40],0.88,0], 9,
        0.85
      ],
    }
  });

  // ── Labels for legends ───────────────────────────────────────────
  map.addLayer({
    id: 'clubs-label',
    type: 'symbol',
    source: 'clubs',
    filter: ['>=', ['get','influence'], 85],
    layout: {
      'text-field': ['get','topName'],
      'text-font': ['Open Sans Regular'],
      'text-size': ['interpolate',['linear'],['zoom'], 3, 9, 8, 12],
      'text-offset': [0, 1.3],
      'text-anchor': 'top',
      'text-allow-overlap': false,
    },
    paint: {
      'text-color': '#1a2a38',
      'text-halo-color': 'rgba(255,255,255,0.9)',
      'text-halo-width': 1.5,
    }
  });

  // ── Cursor ───────────────────────────────────────────────────────
  map.on('mouseenter', 'clubs-dot', () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', 'clubs-dot', () => { map.getCanvas().style.cursor = ''; });

  // ── Click ────────────────────────────────────────────────────────
  let popup = null;
  map.on('click', 'clubs-dot', e => {
    rotating = false;
    const p = e.features[0].properties;
    const cm = clubMap[p.id];
    if (!cm) return;

    if (popup) popup.remove();

    const topPlayer = cm.players[0];
    const more = cm.players.length > 1
      ? `<div class="pop-more">+${cm.players.length - 1} more Swedish players</div>` : '';

    const html = `
      <div class="pop-country">${p.country}</div>
      <div class="pop-club">${p.id}</div>
      <div class="pop-player">${topPlayer.name}</div>
      <div class="pop-meta">${topPlayer.pos} · ${topPlayer.caps} caps · Born ${topPlayer.born}</div>
      ${more}
      <div class="pop-cta" onclick="openPanel('${p.id.replace(/'/g,"\\'")}')">
        View all players →
      </div>`;

    popup = new maplibregl.Popup({ closeButton: true, offset: 12 })
      .setLngLat(e.lngLat)
      .setHTML(html)
      .addTo(map);
  });

  map.on('click', e => {
    const hits = map.queryRenderedFeatures(e.point, { layers: ['clubs-dot'] });
    if (!hits.length && popup) { popup.remove(); popup = null; }
  });

  // ── Zoom label ───────────────────────────────────────────────────
  map.on('zoom', () => {
    const z = map.getZoom();
    document.getElementById('zlbl').textContent = zoomLabel(z);
  });

  // ── Auto-rotation ────────────────────────────────────────────────
  map.on('mousedown', () => { rotating = false; });
  map.on('touchstart', () => { rotating = false; });

  function spin() {
    if (rotating && map.getZoom() < 4) {
      const c = map.getCenter();
      map.setCenter([c.lng + 0.04, c.lat]);
    }
    requestAnimationFrame(spin);
  }
  spin();

  // Done
  setP(100, '');
  setTimeout(() => document.getElementById('boot').classList.add('gone'), 500);

  // Live Wikidata
  fetchWikidata();
}

// ================================================================
//  PANEL
// ================================================================
window.openPanel = function(clubId) {
  const cm = clubMap[clubId];
  if (!cm) return;

  document.getElementById('pbody').innerHTML = `
    <div class="pc-tag">${cm.country}</div>
    <div class="pc-club">${clubId}</div>
    <div class="pc-loc">${cm.stadium} · ${cm.players.length} Swedish ${cm.players.length === 1 ? 'player' : 'players'}</div>
    <div class="divider"></div>
    ${cm.players.map((p,i) => playerRow(p, i, clubId)).join('')}
    <div style="margin-top:18px;font-size:7px;color:#162230;letter-spacing:.12em;text-transform:uppercase">Curated + Wikidata live</div>`;

  document.getElementById('panel').classList.add('open');
};

function playerRow(p, i, cid) {
  const cls = p.influence >= 85 ? 'legend' : p.influence >= 65 ? 'star' : '';
  const id = `bio_${cid.replace(/\W/g,'_')}_${i}`;
  return `<div class="ply" onclick="toggleBio('${id}')">
    <div class="ply-rank">${String(i+1).padStart(2,'0')} · ${p.pos}${p.active ? ' · <span style="color:#3aaa66">Active</span>' : ''}</div>
    <div class="ply-name ${cls}">${p.name}</div>
    <div class="ply-meta">${p.born} · ${p.caps} caps · ${p.goals} goals</div>
    <div class="ply-bio" id="${id}">${p.bio}
      <div class="bio-row">
        <div class="bs"><strong>${p.caps}</strong>Caps</div>
        <div class="bs"><strong>${p.goals}</strong>Goals</div>
        <div class="bs"><strong>${p.born}</strong>Born</div>
      </div>
    </div>
  </div>`;
}

window.toggleBio = function(id) { document.getElementById(id)?.classList.toggle('open'); };
window.closePanel = function() { document.getElementById('panel').classList.remove('open'); };

// ================================================================
//  WIKIDATA LIVE FETCH
// ================================================================
async function fetchWikidata() {
  const lt = document.getElementById('live');
  lt.classList.add('on');

  const q = `SELECT DISTINCT ?player ?playerLabel ?club ?clubLabel ?countryLabel ?lat ?lon ?caps WHERE {
  ?player wdt:P27 wd:Q34;wdt:P106 wd:Q937857;wdt:P54 ?club.
  ?club wdt:P625 ?coord;wdt:P17 ?country.
  FILTER(?country NOT IN (wd:Q34,wd:Q33,wd:Q35,wd:Q20,wd:Q189))
  BIND(geof:latitude(?coord) AS ?lat) BIND(geof:longitude(?coord) AS ?lon)
  OPTIONAL{?player wdt:P1350 ?caps}
  SERVICE wikibase:label{bd:serviceParam wikibase:language "en"}
} LIMIT 1500`;

  try {
    const r = await fetch(
      `https://query.wikidata.org/sparql?query=${encodeURIComponent(q)}&format=json`,
      { headers: { 'Accept': 'application/sparql-results+json' } }
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    mergeWikidata(j.results.bindings);
    lt.textContent = '✓ Live data loaded';
    lt.classList.add('ok');
    setTimeout(() => lt.classList.remove('on'), 3500);
  } catch(e) {
    console.warn('Wikidata:', e);
    lt.textContent = 'Using curated data';
    setTimeout(() => lt.classList.remove('on'), 3000);
  }
}

function mergeWikidata(bindings) {
  const known = new Set([...seenNames].map(n => n.toLowerCase()));
  let added = 0;

  bindings.forEach(b => {
    const pName = b.playerLabel?.value;
    const cName = b.clubLabel?.value;
    const lat = parseFloat(b.lat?.value);
    const lon = parseFloat(b.lon?.value);
    const caps = parseInt(b.caps?.value) || 0;

    if (!pName || !cName || isNaN(lat) || isNaN(lon)) return;
    if (known.has(pName.toLowerCase())) return;

    const inf = Math.min(55, Math.max(12, Math.round(caps * 0.6)));

    let ck = Object.keys(CLUBS).find(k => k.toLowerCase() === cName.toLowerCase());
    if (!ck) {
      ck = cName;
      CLUBS[ck] = { lat, lng: lon, city: cName, country: b.countryLabel?.value || '?', stadium: cName };
    }

    const np = {
      name: pName, influence: inf, caps, goals: 0, born: '?',
      pos: 'Player', active: false,
      bio: `Swedish international · ${caps} caps · Source: Wikidata.`,
      clubs: [ck]
    };

    PLAYERS.push(np);
    seenNames.add(pName);
    known.add(pName.toLowerCase());

    if (!clubMap[ck]) clubMap[ck] = { ...CLUBS[ck], clubName: ck, players: [] };
    if (!clubMap[ck].players.find(x => x.name === pName)) {
      clubMap[ck].players.push(np);
      clubMap[ck].players.sort((a,b) => b.influence - a.influence);
    }
    added++;
  });

  if (added > 0 && map) {
    updateStats();
    const src = map.getSource('clubs');
    if (src) src.setData(buildGeoJSON());
    console.log(`Wikidata added ${added} players`);
  }
}
